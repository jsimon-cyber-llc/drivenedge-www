<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Driven Edge — OG card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@500&display=swap">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1200px; height:630px; }
  body{
    background:#16130F;
    color:#F4F0E9;
    font-family:"Fraunces", Georgia, serif;
    position:relative;
    overflow:hidden;
  }
  /* forged-edge warmth, top-right */
  .glow{
    position:absolute; inset:0;
    background:
      radial-gradient(60% 90% at 100% 0%, rgba(234,115,23,0.30) 0%, transparent 55%),
      radial-gradient(50% 70% at 92% 8%, rgba(194,65,12,0.22) 0%, transparent 60%);
  }
  .frame{
    position:absolute; inset:0;
    padding:84px 90px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .top{ display:flex; align-items:center; gap:22px; }
  .mark{ width:64px; height:64px; flex:0 0 auto; }
  .wordmark{
    font-weight:600; font-size:38px; letter-spacing:-0.01em; color:#FAF8F4;
  }
  .headline{
    font-weight:600; font-size:96px; line-height:1.02; letter-spacing:-0.015em;
    max-width:20ch; color:#FAF8F4;
  }
  .headline .ink{ color:#EA7317; font-style:italic; font-weight:600; }
  .bottom{ display:flex; align-items:center; justify-content:space-between; }
  .tag{
    font-family:"JetBrains Mono", monospace; font-weight:500;
    font-size:21px; letter-spacing:0.22em; text-transform:uppercase;
    color:#C8C0B4;
  }
  .pip{
    display:inline-block; width:11px; height:11px; border-radius:50%;
    background:#EA7317; margin-right:14px; vertical-align:middle;
    box-shadow:0 0 0 6px rgba(234,115,23,0.18);
  }
  .url{
    font-family:"JetBrains Mono", monospace; font-weight:500;
    font-size:21px; letter-spacing:0.06em; color:#8C8377;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="frame">
    <div class="top">
      <svg class="mark" viewBox="0 0 64 64" fill="none" aria-hidden="true">
        <rect width="64" height="64" rx="15" fill="#211C16"/>
        <path d="M20 16 L20 48 L34 48 C44 48 50 41 50 32 C50 23 44 16 34 16 Z" fill="none" stroke="#FAF8F4" stroke-width="4.5" stroke-linejoin="round"/>
        <path d="M44 32 L52 28 L52 36 Z" fill="#EA7317"/>
      </svg>
      <span class="wordmark">Driven Edge</span>
    </div>

    <h1 class="headline">We build software <span class="ink">worth keeping.</span></h1>

    <div class="bottom">
      <span class="tag"><span class="pip"></span>Software, worked to an edge</span>
      <span class="url">drivenedge.net</span>
    </div>
  </div>
</body>
</html>
